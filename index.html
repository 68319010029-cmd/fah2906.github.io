<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มสมัครสมาชิก (Form & Input Controls)</title>
    <style>
        /* --- Reset & Base Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- Card Container --- */
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
        }

        .form-container h2 {
            color: #333333;
            margin-bottom: 8px;
            font-size: 24px;
        }

        .form-container p {
            color: #666666;
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* --- Form Groups --- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #444444;
            font-size: 14px;
            font-weight: 600;
        }

        /* --- Input Controls --- */
        /* Text Box, Password, Email, Select, Textarea */
        .input-control {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            color: #333333;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-control:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
        }

        textarea.input-control {
            resize: vertical;
            min-height: 100px;
        }

        /* --- Radio & Checkbox Groups --- */
        .radio-group, .checkbox-group {
            display: flex;
            gap: 16px;
            margin-top: 4px;
        }

        .inline-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal !important;
            cursor: pointer;
            font-size: 15px;
        }

        .inline-label input[type="radio"],
        .inline-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #4a90e2; /* เปลี่ยนสีตัวเลือกเป็นสีหลัก */
        }

        /* --- Submit Button --- */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #357abd;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* --- Validation Styles (HTML5 built-in feedback) --- */
        .input-control:invalid:focus {
            border-color: #e74c3c;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.15);
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>สร้างบัญชีผู้ใช้</h2>
        <p>กรุณากรอกข้อมูลให้ครบถ้วนเพื่อลงทะเบียนเข้าใช้งาน</p>

        <form action="#" method="POST">
            
            <div class="form-group">
                <label for="username">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" id="username" name="username" class="input-control" placeholder="เช่น somchai_99" required minlength="4">
            </div>

            <div class="form-group">
                <label for="email">อีเมล (Email)</label>
                <input type="email" id="email" name="email" class="input-control" placeholder="example@domain.com" required>
            </div>

            <div class="form-group">
                <label for="password">รหัสผ่าน (Password)</label>
                <input type="password" id="password" name="password" class="input-control" placeholder="อย่างน้อย 8 ตัวอักษร" required minlength="8">
            </div>

            <div class="form-group">
                <label for="occupation">อาชีพ (Occupation)</label>
                <select id="occupation" name="occupation" class="input-control" required>
                    <option value="" disabled selected>เลือกอาชีพของคุณ</option>
                    <option value="student">นักเรียน / นักศึกษา</option>
                    <option value="developer">นักพัฒนาซอฟต์แวร์</option>
                    <option value="designer">ดีไซเนอร์</option>
                    <option value="other">อื่นๆ</option>
                </select>
            </div>

            <div class="form-group">
                <label>เพศ (Gender)</label>
                <div class="radio-group">
                    <label class="inline-label">
                        <input type="radio" name="gender" value="male" required> ชาย
                    </label>
                    <label class="inline-label">
                        <input type="radio" name="gender" value="female"> หญิง
                    </label>
                    <label class="inline-label">
                        <input type="radio" name="gender" value="other"> ไม่ระบุ
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="bio">แนะนำตัวเองสั้นๆ (Bio)</label>
                <textarea id="bio" name="bio" class="input-control" placeholder="เขียนเรื่องราวเกี่ยวกับคุณซักเล็กน้อย..."></textarea>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <label class="inline-label">
                        <input type="checkbox" name="terms" required> ฉันยอมรับเงื่อนไขและข้อตกลงการใช้งาน
                    </label>
                </div>
            </div>

            <button type="submit" class="btn-submit">ลงทะเบียน</button>

        </form>
    </div>

</body>
</html>
